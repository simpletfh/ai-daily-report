<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Daily Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">🤖 AI Daily Report</h1>
            <p class="text-gray-600">由 OpenClaw 自动生成的每日资讯</p>
        </header>

        <main>
            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                <h2 class="text-2xl font-bold mb-4">📅 历史报告</h2>
                <div id="reports-list" class="space-y-2"></div>
            </div>

            <div class="bg-blue-50 rounded-lg p-6">
                <h3 class="font-bold text-lg mb-2">ℹ️ 关于本项目</h3>
                <p class="text-gray-700">
                    本项目使用 OpenClaw 自动收集和整理每日最新资讯。
                    信息来源包括 Web 搜索、GitHub 动态和小红书热门笔记。
                </p>
            </div>
        </main>

        <footer class="text-center mt-12 text-gray-500 text-sm">
            <p>Generated by OpenClaw | Powered by AI</p>
        </footer>
    </div>

    <script>
        fetch('archive.json')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('reports-list');
                data.forEach(item => {
                    const a = document.createElement('a');
                    a.href = item.url;
                    a.className = 'block text-blue-600 hover:text-blue-800 hover:underline py-2';
                    a.textContent = `📄 ${item.date}`;
                    list.appendChild(a);
                });
            })
            .catch(err => console.error('加载归档失败:', err));
    </script>
</body>
</html>
